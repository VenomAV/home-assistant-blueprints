blueprint:
  name: Water leak Telegram Notifications
  description: Send telegram notifications when a water leak is detected
  domain: automation
  input:
    water_leak_sensor:
      name: Water Leak Sensor
      description: This is the binary sensor which is used to detect water leaks
      selector:
        entity:
          filter:
            - domain: binary_sensor
            - device_class: moisture
    telegram_bot:
      name: Telegram Bot
      description: "Telegram Bot to be used to send the notifications"
      selector:
        config_entry:
          integration: telegram_bot
    telegram_bot_target:
      name: Telegram Bot Target
      description: "The target channel id the bot will send the notification to"
      selector:
        text: 
trigger:
  - platform: state
    entity_id:
      - !input water_leak_sensor
    not_from: "on"
    to: "on"
action:
  - action: telegram_bot.send_message
    metadata: {}
    data:
      message: "💦💦 Perdita d'acqua in {{ area_name(trigger.entity_id) }} 🚨"
      config_entry_id: !input telegram_bot
      target:
        - !input telegram_bot_target
mode: single
