blueprint:
  name: Camera Telegram Notifications
  description: Send telegram notifications when person is detected and the alarm is active
  domain: automation
  input:
    person_detection_sensor:
      name: Person Detection Sensor
      description: This is the binary sensor which is used to detect people
      selector:
        entity:
          filter:
            - domain: binary_sensor
            - device_class: motion
    alarm_disarmed:
      name: Alarm Disarmed Sensor
      description: Binary sensor which provides alarm disarmed state
      selector:
        entity:
          filter:
            - domain: binary_sensor
    camera_name:
      name: Camera name
      description: "Sting to be used in the Telegram notifications"
      default: ""
    telegram_bot:
      name: Telegram Bot
      description: "Telegram Bot to be used to send the notifications"
      selector:
        config_entry:
          integration: telegram_bot
    telegram_bot_target:
      name: Telegram Bot Target
      description: "The target channel id the bot will send the notification to"
      selector:
        text: 
trigger:
  - platform: state
    entity_id:
      - !input person_detection_sensor
    not_from: "on"
    to: "on"
condition:
  - condition: not
    conditions:
      - condition: state
        entity_id: !input alarm_disarmed
        state: "on"
action:
  - variables:
      camera_name: !input camera_name
      camera_slug: "{{ camera_name | slugify(separator='_') }}"
      camera_device_id: "{{ device_id(trigger.entity_id) }}"
      message: "Rilevata persona: {{ camera_name }}"
      snapshot_filename:
        /config/www/tmp/{{ camera_slug }}/snapshots/snapshot-{{ now().timestamp()
        }}.jpg
      video_filename:
        /config/www/tmp/{{ camera_slug }}/recordings/recording-{{ now().timestamp()
        }}.jpg
  - metadata: {}
    data:
      filename: "{{ snapshot_filename }}"
    target:
      device_id: "{{ camera_device_id }}"
    action: camera.snapshot
  - action: telegram_bot.send_photo
    metadata: {}
    data:
      verify_ssl: true
      file: "{{ snapshot_filename }}"
      caption: "{{ message }}"
      config_entry_id: !input telegram_bot
      target:
        - !input telegram_bot_target
  - metadata: {}
    data:
      lookback: 0
      duration: 15
      filename: "{{ video_filename }}"
    target:
      device_id: "{{ camera_device_id }}"
    action: camera.record
  - action: telegram_bot.send_video
    metadata: {}
    data:
      verify_ssl: true
      config_entry_id: !input telegram_bot
      file: "{{ video_filename }}"
      caption: "{{ message }} (video)"
      target:
        - !input telegram_bot_target
  - wait_for_trigger:
      - platform: state
        entity_id:
          - !input person_detection_sensor
        to: "off"
    timeout:
      hours: 0
      minutes: 1
      seconds: 0
      milliseconds: 0
mode: single
